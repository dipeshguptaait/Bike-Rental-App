<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Management</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        h1 {
            color: white;
            text-align: center;
            margin-bottom: 30px;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .content-wrapper {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .card {
            background: white;
            border-radius: 10px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .card h2 {
            color: #667eea;
            margin-bottom: 20px;
            font-size: 1.5em;
            border-bottom: 2px solid #667eea;
            padding-bottom: 10px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            color: #333;
            font-weight: 600;
            font-size: 0.95em;
        }

        input {
            width: 100%;
            padding: 10px;
            border: 2px solid #e0e0e0;
            border-radius: 5px;
            font-size: 1em;
            transition: border-color 0.3s;
        }

        input:focus {
            outline: none;
            border-color: #667eea;
        }

        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        .delete-btn {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            font-size: 0.9em;
            padding: 8px;
            margin-top: 5px;
        }

        .update-btn {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            font-size: 0.9em;
            padding: 8px;
            margin-top: 5px;
            margin-bottom: 5px;
        }

        .message {
            padding: 12px;
            border-radius: 5px;
            margin-top: 15px;
            font-weight: 600;
            text-align: center;
        }

        .success {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .error {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .users-list {
            grid-column: 1 / -1;
        }

        .users-list .card {
            background: white;
        }

        .user-item {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 10px;
            border-left: 4px solid #667eea;
        }

        .user-item p {
            margin: 5px 0;
            color: #555;
        }

        .user-item strong {
            color: #333;
        }

        .user-item .user-id {
            color: #999;
            font-size: 0.85em;
            margin-bottom: 8px;
        }

        .user-actions {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }

        .user-actions button {
            flex: 1;
            padding: 8px;
            font-size: 0.85em;
        }

        .empty-message {
            text-align: center;
            color: #999;
            padding: 40px 20px;
            font-style: italic;
        }

        @media (max-width: 768px) {
            .content-wrapper {
                grid-template-columns: 1fr;
            }

            h1 {
                font-size: 1.8em;
            }

            .card {
                padding: 15px;
            }
        }

        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>👤 User Management</h1>

        <div class="content-wrapper">
            <!-- Create User Card -->
            <div class="card">
                <h2>➕ Create User</h2>
                <form id="createUserForm">
                    <div class="form-group">
                        <label for="name">Name:</label>
                        <input type="text" id="name" name="name" required>
                    </div>
                    <div class="form-group">
                        <label for="email">Email:</label>
                        <input type="email" id="email" name="email" required>
                    </div>
                    <div class="form-group">
                        <label for="password">Password:</label>
                        <input type="password" id="password" name="password" required>
                    </div>
                    <button type="submit">Create User</button>
                    <div id="createMessage"></div>
                </form>
            </div>

            <!-- Update User Card -->
            <div class="card">
                <h2>✏️ Update User</h2>
                <form id="updateUserForm">
                    <div class="form-group">
                        <label for="updateId">User ID:</label>
                        <input type="text" id="updateId" name="updateId" placeholder="Paste user ID" required>
                    </div>
                    <div class="form-group">
                        <label for="updateName">Name:</label>
                        <input type="text" id="updateName" name="updateName">
                    </div>
                    <div class="form-group">
                        <label for="updateEmail">Email:</label>
                        <input type="email" id="updateEmail" name="updateEmail">
                    </div>
                    <div class="form-group">
                        <label for="updatePassword">Password:</label>
                        <input type="password" id="updatePassword" name="updatePassword">
                    </div>
                    <button type="submit">Update User</button>
                    <div id="updateMessage"></div>
                </form>
            </div>

            <!-- Users List Card -->
            <div class="card users-list">
                <h2>📋 All Users</h2>
                <button id="fetchUsersBtn" style="margin-bottom: 20px;">Refresh Users List</button>
                <div id="usersList" class="empty-message">Click "Refresh Users List" to load users</div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:3000/api';

        // Create User
        document.getElementById('createUserForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const messageDiv = document.getElementById('createMessage');
            
            try {
                const response = await fetch(`${API_URL}/users`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        name: document.getElementById('name').value,
                        email: document.getElementById('email').value,
                        password: document.getElementById('password').value,
                    })
                });

                const data = await response.json();

                if (response.ok) {
                    messageDiv.className = 'message success';
                    messageDiv.textContent = '✅ User created successfully!';
                    document.getElementById('createUserForm').reset();
                    setTimeout(() => fetchUsers(), 1000);
                } else {
                    messageDiv.className = 'message error';
                    messageDiv.textContent = `❌ ${data.message}`;
                }
            } catch (error) {
                messageDiv.className = 'message error';
                messageDiv.textContent = `❌ Error: ${error.message}`;
            }
        });

        // Fetch and Display All Users
        async function fetchUsers() {
            const usersList = document.getElementById('usersList');
            usersList.innerHTML = '<div class="loading"></div> Loading...';

            try {
                const response = await fetch(`${API_URL}/users`);
                const users = await response.json();

                if (Array.isArray(users) && users.length > 0) {
                    usersList.innerHTML = users.map(user => `
                        <div class="user-item">
                            <div class="user-id">ID: ${user._id}</div>
                            <p><strong>Name:</strong> ${user.name}</p>
                            <p><strong>Email:</strong> ${user.email}</p>
                            <div class="user-actions">
                                <button class="update-btn" onclick="populateUpdateForm('${user._id}', '${user.name}', '${user.email}')">Edit</button>
                                <button class="delete-btn" onclick="deleteUser('${user._id}')">Delete</button>
                            </div>
                        </div>
                    `).join('');
                } else {
                    usersList.innerHTML = '<div class="empty-message">No users found</div>';
                }
            } catch (error) {
                usersList.innerHTML = `<div class="message error">❌ Error fetching users: ${error.message}</div>`;
            }
        }

        // Populate Update Form
        function populateUpdateForm(id, name, email) {
            document.getElementById('updateId').value = id;
            document.getElementById('updateName').value = name;
            document.getElementById('updateEmail').value = email;
            document.getElementById('updatePassword').value = '';
            document.querySelector('.card:nth-of-type(2)').scrollIntoView({ behavior: 'smooth' });
        }

        // Update User
        document.getElementById('updateUserForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const messageDiv = document.getElementById('updateMessage');
            const userId = document.getElementById('updateId').value;

            try {
                const updateData = {};
                if (document.getElementById('updateName').value) {
                    updateData.name = document.getElementById('updateName').value;
                }
                if (document.getElementById('updateEmail').value) {
                    updateData.email = document.getElementById('updateEmail').value;
                }
                if (document.getElementById('updatePassword').value) {
                    updateData.password = document.getElementById('updatePassword').value;
                }

                const response = await fetch(`${API_URL}/users/${userId}`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(updateData)
                });

                const data = await response.json();

                if (response.ok) {
                    messageDiv.className = 'message success';
                    messageDiv.textContent = '✅ User updated successfully!';
                    document.getElementById('updateUserForm').reset();
                    setTimeout(() => fetchUsers(), 1000);
                } else {
                    messageDiv.className = 'message error';
                    messageDiv.textContent = `❌ ${data.message}`;
                }
            } catch (error) {
                messageDiv.className = 'message error';
                messageDiv.textContent = `❌ Error: ${error.message}`;
            }
        });

        // Delete User
        async function deleteUser(userId) {
            if (confirm('Are you sure you want to delete this user?')) {
                try {
                    const response = await fetch(`${API_URL}/users/${userId}`, {
                        method: 'DELETE',
                    });

                    const data = await response.json();

                    if (response.ok) {
                        alert('✅ User deleted successfully!');
                        fetchUsers();
                    } else {
                        alert(`❌ ${data.message}`);
                    }
                } catch (error) {
                    alert(`❌ Error: ${error.message}`);
                }
            }
        }

        // Fetch Users Button
        document.getElementById('fetchUsersBtn').addEventListener('click', fetchUsers);

        // Enable CORS if needed - load on page load
        window.addEventListener('load', () => {
            console.log('User Management UI loaded');
        });
    </script>
</body>
</html>
